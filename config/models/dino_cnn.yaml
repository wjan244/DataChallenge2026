# Model
model_name: "facebook/dinov3-vith16plus-pretrain-lvd1689m"
type: dino_cnn
patch_use_cls: false
embedding_dir: "embedding-vit16h+patches"
save_fp16: true
embed_batch_size: 32
save_patches: true

# Data
n_bins: 20
train_use_noisy: true
val_use_noisy: true

# CNN
smooth_alpha: 50        
lp_lr: 5.0e-3
lp_weight_decay: 1.0e-2
lp_epochs: 100
lp_batch_size: 512
lp_loss: "CompoundLoss"
lp_loss_alpha: 2.0    
lp_loss_beta: 0.2     
lp_loss_gamma: 1.0    
lp_loss_kappa: 1.0    
lp_patience: 20
lp_dropout: 0.2


# optuna_n_trials: 50
# optuna_epochs: 20   # short runs during search
# optuna_patience: 5   # short runs during search
