# Model
model_name: "facebook/dinov3-vitb16-pretrain-lvd1689m"
type: dino_lp
embedding_dir: "embedding-vitb16+patches"
save_fp16: True
embed_batch_size: 256
save_patches: true

# Data
n_bins: 20
val_use_noisy: true
train_use_noisy: true

# Linear probe

smooth_alpha: 0        # count-based: alpha/n_samples added to each bin
lp_embedding: "concat"  # "cls" | "patch_mean" | "concat"
lp_hidden: 128          # 0 = plain linear
lp_lr: 1.0e-3
lp_weight_decay: 1.0e-3
lp_epochs: 100
lp_batch_size: 2048
lp_loss: "CompoundLoss"
lp_loss_alpha: 1.0    
lp_loss_beta: 0.1    
lp_loss_gamma: 1.0    
lp_loss_kappa: 0.0  
lp_patience: 5
lp_dropout: 0.2
# General
seed: 10


# optuna_n_trials: 50
# optuna_epochs: 20   # short runs during search
# optuna_patience: 5   # short runs during search
