# config/models/vit_base_patch16_dinov3.yaml
model: 'vit_base_patch16_dinov3.lvd1689m'

globaux:
  SEED: 42
  N_SAMPLE: 5000
  N_BINS: 20
  NUM_CLASSES: 1
  PATIENCE: 5
  BATCH_SIZE: 128

domain_adaptation_training:
  run_execution: False

probing_training:
  run_execution: True
  loss_name: "nMSE"
  learning_rate: 1.0e-3
  num_epoch: 20
  augmentation: False
  method_FT: "probing_training"
  loader_factory: "get_challenge_train_loader"
  val_loader_factory: "get_challenge_val_loader"
  val_split: "val_samp"
  method_kwargs:
    rank: 8
    alpha: 16
    dropout: 0.2
    probing_type: "mlp_probing"
    hidden_size: 512

lora_training:
  run_execution: False