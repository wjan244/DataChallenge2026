model: 'vit_base_patch16_dinov3.lvd1689m'
    
probing_training:
  run_execution: True
  loss_name: "HuberLoss"
  learning_rate: 1.0e-3
  num_epoch: 15
  method_FT: "probing_training"
  method_kwargs:
    num_classes: 1
    probing_type: "mlp_probing"
    hidden_size: 512

adversarial_probing_training:
  run_execution: False
  loss_name : "HuberPWGLossRegularized"
  loss_name_1: "BCE"
  learning_rate: 3.0e-4
  num_epoch: 1
  method_FT: "reversal_probing"
  method_kwargs:
    hidden_size: 768
    num_head : 2
    num_classes: 1
    lambda: 0.5

lora_training:
  run_execution: False
  loss_name: "HuberLossRegularized"
  learning_rate: 2.0e-4
  num_epoch: 25
  method_FT: "lora_training"
  method_kwargs:
    rank: 8
    alpha: 16
    dropout: 0.1
    num_classes: 1