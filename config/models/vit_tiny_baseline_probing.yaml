model: 'vit_tiny_patch16_224'

globaux:
  SEED: 42
  N_SAMPLE: 5000
  N_BINS: 20
  NUM_CLASSES: 1
  PATIENCE: 3
  BATCH_SIZE: 256
  COMPILE: False

# CelebA pre-training skipped — start directly from ImageNet weights
domain_adaptation_training:
  run_execution: False

# Stage 1 of actual training: freeze backbone, train MLP head
probing_training:
  run_execution: True
  loss_name: "nMSE"
  learning_rate: 1.0e-3
  num_epoch: 2
  augmentation: True
  method_FT: "probing_training"
  loader_factory: "get_challenge_train_loader"
  val_loader_factory: "get_challenge_val_loader"
  val_split: "val_samp"
  method_kwargs:
    rank: 8
    alpha: 16
    dropout: 0.2
    probing_type: "mlp_probing"
    hidden_size: 512

# Stage 2: LoRA fine-tuning on top of probing checkpoint
lora_training:
  run_execution: False
